name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kadam-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kadam-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Create Windows Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-windows
          name: "Kadam v1.0.0 - Windows"
          body: |
            ## Kadam v1.0.0 - Windows

            Offline AI-powered language learning desktop app.

            ### Downloads
            - **Windows Installer (.msi)**: For standard installation
            - **Windows Setup (.exe)**: NSIS installer alternative

            The Qwen3 1.7B AI model downloads automatically on first launch — no manual setup needed.

            ### Features
            - Interactive comic-based stories for language learning
            - Offline AI (Qwen3 1.7B) — no internet required after model download
            - Supports Hindi, Telugu, Tamil, Spanish, French, German
            - Quizzes: MCQ, reorder, passage comprehension, free-response
            - Vocabulary learning with AI translation
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
