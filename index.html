<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadam Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #D5D1AC;
            font-family: Georgia, 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Desktop Layout */
        .main-container {
            display: flex;
            flex: 1;
            margin-left: 220px; /* Account for fixed sidebar width */
            padding: 20px;
            gap: 20px;
            max-width: calc(1400px - 220px);
            width: calc(100% - 220px);
        }

        /* Sidebar for desktop */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 200px;
            height: 100vh;
            background-color: #DFDBC0;
            padding: 40px 20px;
            z-index: 100;
        }

        .sidebar img {
            width: 100px;
            height: 100px;
            cursor: pointer;
            transition: transform 0.3s ease;
            border-radius: 12px;
        }

        .sidebar img:hover {
            transform: scale(1.05);
        }

        .sidebar img[src="logo.png"] {
            transition: transform 1.5s ease;
        }

        .sidebar img[src="logo.png"]:hover {
            transform: rotate(360deg);
        }

        .sidebar img[src="flashlight.png"] {
            width: auto;
            height: 6%;
        }

        /* Comics area */
        .comics-area {
            width: 100%;
            background-color: #DFDBC0;
            border-radius: 10px;
            padding: 30px;
            min-height: calc(100vh - 40px);
        }

        .comics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .comic-book {
            background-color: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
            aspect-ratio: 3/4;
        }

        .comic-book:hover {
            transform: translateY(-5px);
        }

        .comic-book img {
            width: 100%;
            height: 80%;
            object-fit: cover;
        }

        .comic-cover {
            width: 100%;
            height: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }

        .comic-cover-text {
            font-size: 16px;
        }

        .comic-title {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            background-color: #fff;
            height: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .level-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #C9AB00;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .comic-book {
            position: relative;
        }

        /* Mobile bottom navigation */
        .bottom-nav {
            display: none;
            background-color: #DFDBC0;
            padding: 15px;
            justify-content: space-around;
            align-items: center;
        }

        .bottom-nav img {
            width: 50px;
            height: 50px;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }

        .bottom-nav img:hover {
            transform: scale(1.1);
        }

        .bottom-nav img[src="flashlight.png"] {
            width: auto;
            height: 50px;
        }

        /* Settings Popup */
        .settings-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #D2CFB9;
            padding: 30px;
            border-radius: 15px;
            z-index: 1000;
            min-width: 300px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .settings-popup h2 {
            margin-bottom: 20px;
            color: black;
            text-align: center;
            font-weight: normal;
        }

        .settings-popup label {
            display: block;
            margin-bottom: 10px;
            color: black;
            font-weight: normal;
        }

        .dropdown {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #B9B6A1;
            margin-bottom: 20px;
            font-family: Georgia, 'Times New Roman', serif;
            color: black;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
            padding-right: 35px;
        }

        .dropdown option {
            background-color: #B9B6A1;
            color: black;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background-color: #98B482;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            font-family: Georgia, 'Times New Roman', serif;
            color: black;
            font-weight: normal;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        .delete-data-btn {
            width: 100%;
            padding: 12px;
            background-color: #C4A484;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            font-family: Georgia, 'Times New Roman', serif;
            color: black;
            font-weight: normal;
            margin-top: 15px;
        }

        .delete-data-btn:hover {
            opacity: 0.9;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .filter-info {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
            font-style: italic;
        }

        /* Mobile Responsive Design */
        @media (max-width: 960px) {
            .main-container {
                flex-direction: column;
                margin-left: 0;
                width: 100%;
                max-width: none;
                padding: 10px;
                gap: 10px;
            }

            .sidebar {
                display: none;
                position: relative;
                width: auto;
                height: auto;
            }

            .bottom-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
            }

            .comics-area {
                margin-bottom: 80px;
                padding: 20px;
                min-height: auto;
            }

            .comics-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .comic-book {
                aspect-ratio: 3/4;
            }

            .comic-title {
                font-size: 12px;
                padding: 8px;
            }

            .level-badge {
                font-size: 10px;
                padding: 2px 6px;
            }

            .settings-popup {
                margin: 20px;
                width: calc(100% - 40px);
                min-width: unset;
            }
        }

        /* Tablet adjustments */
        @media (min-width: 961px) and (max-width: 1200px) {
            .comics-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Hide comics that don't match selected level */
        .comic-book.hidden {
            display: none;
        }
        /* Translator download section */
        .translator-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #999;
        }

        .translator-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .translator-status-text {
            font-size: 0.9rem;
            color: #666;
        }

        .translator-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .translator-status-dot.ready {
            background: #4CAF50;
        }

        .translator-status-dot.not-ready {
            background: #999;
        }

        .download-translator-btn {
            width: 100%;
            padding: 10px;
            background-color: #7A9E7E;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-family: Georgia, 'Times New Roman', serif;
            color: white;
            transition: opacity 0.2s;
        }

        .download-translator-btn:hover {
            opacity: 0.9;
        }

        .download-translator-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .translator-progress {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            margin-top: 8px;
            display: none;
        }

        .translator-progress-fill {
            height: 100%;
            background: #7A9E7E;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
    <script src="tauri-api.js"></script>
    <link rel="stylesheet" href="onboarding.css">
</head>
<body>
    <!-- Desktop Sidebar -->
    <div class="sidebar">
        <img src=logo.png alt="Logo">
        <img src=vault.png alt="Vault" onclick="location.href='wordVault.html'">
        <img src=flashlight.png alt="Flashlight" onclick="location.href='flashlight.html'">
        <img src=questions.png alt="Builder" onclick="location.href='question.html'">
        <img src=settings.png alt="Settings" onclick="openSettings()">
    </div>

    <div class="main-container">
        <!-- Comics Area -->
        <div class="comics-area">
            <div class="filter-info" id="filterInfo">Showing all comics</div>
            <div class="comics-grid" id="comicsGrid">
                <!-- Comics will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <div class="bottom-nav">
        <img src=logo.png alt="Logo">
        <img src=vault.png alt="Vault" onclick="location.href='wordVault.html'">
        <img src=flashlight.png alt="Flashlight" onclick="location.href='flashlight.html'">
        <img src=questions.png alt="Builder" onclick="location.href='question.html'">
        <img src=settings.png alt="Settings" onclick="openSettings()">
    </div>

    <!-- Settings Popup -->
    <div class="overlay" id="overlay" onclick="closeSettings()"></div>
    <div class="settings-popup" id="settingsPopup">
        <h2>Settings</h2>
        <label for="appLanguage">Your Language:</label>
        <select id="appLanguage" class="dropdown">
            <option value="hindi">Hindi</option>
            <option value="telugu">Telugu</option>
            <option value="tamil">Tamil</option>
        </select>
        <label for="proficiency">English Proficiency Level:</label>
        <select id="proficiency" class="dropdown">
            <option value="ALL">Show All Levels</option>
            <option value="A1">A1 - Beginner</option>
            <option value="A2">A2 - Elementary</option>
            <option value="B1">B1 - Intermediate</option>
            <option value="B2">B2 - Upper Intermediate</option>
        </select>
        <button class="save-btn" onclick="saveSettings()">Save Settings</button>

        <!-- Gemma 2B AI Model Download Section -->
        <div class="translator-section">
            <label>Gemma 2B AI Model:</label>
            <div class="translator-status">
                <span class="translator-status-text">
                    <span class="translator-status-dot" id="aiModelStatusDot"></span>
                    <span id="aiModelStatusText">Checking...</span>
                </span>
            </div>
            <button class="download-translator-btn" id="downloadAIModelBtn" onclick="downloadAIModel()">
                Download AI Model
            </button>
            <div class="translator-progress" id="aiModelProgress">
                <div class="translator-progress-fill" id="aiModelProgressFill"></div>
            </div>
            <p style="font-size: 0.8rem; color: #888; margin-top: 8px;">
                Powers translations, hints, and explanations (~1.8GB)
            </p>
        </div>

        <button class="delete-data-btn" onclick="deleteAllData()">Delete All Data</button>
    </div>

    <script>
        // Comic data with levels and information
        const comics = [
            {
                id: 'little_red_hen',
                title: 'The Little Red Hen',
                level: 'A1',
                color: '#FF6B6B',
                link: 'little_red_hen.html'
            },
            {
                id: 'joe',
                title: 'The day I met Joe',
                level: 'A2',
                color: '#40E0D0',
                link: 'joe.html'
            },
            {
                id: 'cow',
                title: 'The Birth Of Jesus Christ',
                level: 'A1',
                color: '#F06292',
                link: 'cow.html'
            },
            {
                id: 'leprechaun',
                title: 'Where the Leprechauns Hide Their Gold',
                level: 'A2',
                color: '#2E7D32',
                link: 'story.html?id=leprechaun'
            },
            {
                id: 'mia',
                title: 'The World Under the Stairs',
                level: 'A1',
                color: '#E91E63',
                link: 'story.html?id=mia'
            },
            {
                id: 'ra',
                title: 'How Thoth Won the Extra Days',
                level: 'B1',
                color: '#D4AF37',
                link: 'story.html?id=ra'
            },
            {
                id: 'dress',
                title: 'Jenny\'s Diary: The Blue Dress',
                level: 'A2',
                color: '#20B2AA',
                link: 'story.html?id=dress'
            },
            {
                id: 'sweet',
                title: 'Sweet Amnesia',
                level: 'B2',
                color: '#9C27B0',
                link: 'story.html?id=sweet'
            },
            {
                id: 'jackA',
                title: 'The Tale of Jack-O\'-Lanterns: Part 1',
                level: 'B1',
                color: '#FF6F00',
                link: 'story.html?id=jackA'
            },
            {
                id: 'jackB',
                title: 'The Tale of Jack-O\'-Lanterns: Part 2',
                level: 'B1',
                color: '#FF8F00',
                link: 'story.html?id=jackB'
            },
        ];

        let currentLevel = localStorage.getItem('proficiencyLevel') || 'ALL';

        function renderComics() {
            console.log('Rendering comics...', comics.length); // Debug log
            const grid = document.getElementById('comicsGrid');
            const filterInfo = document.getElementById('filterInfo');
            
            if (!grid) {
                console.error('Comics grid not found!');
                return;
            }
            
            grid.innerHTML = '';
            
            const filteredComics = currentLevel === 'ALL' ? 
                comics : 
                comics.filter(comic => comic.level === currentLevel);

            console.log('Filtered comics:', filteredComics.length); // Debug log

            if (filteredComics.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #666; grid-column: 1/-1;">No comics available for this level.</p>';
                filterInfo.textContent = `No comics found for level ${currentLevel}`;
                return;
            }

            filteredComics.forEach(comic => {
                const comicElement = document.createElement('div');
                comicElement.className = 'comic-book';
                comicElement.onclick = () => {
                    // Track for tutorial
                    if (window.tutorialGuide && comic.id === 'little_red_hen') {
                        window.tutorialGuide.trackComicOpened();
                        // Small delay to ensure tutorial elements are cleared
                        setTimeout(() => {
                            location.href = comic.link;
                        }, 100);
                    } else {
                        location.href = comic.link;
                    }
                };
                
                comicElement.innerHTML = `
                    <div class="level-badge">${comic.level}</div>
                    <div class="comic-cover" style="background-color: ${comic.color};">
                        <div class="comic-cover-text">${comic.title}</div>
                    </div>
                    <div class="comic-title">${comic.title}</div>
                `;
                
                grid.appendChild(comicElement);
            });

            // Update filter info
            if (currentLevel === 'ALL') {
                filterInfo.textContent = `Showing all ${comics.length} comics`;
            } else {
                filterInfo.textContent = `Showing ${filteredComics.length} ${currentLevel} level comics`;
            }
            
            console.log('Comics rendered successfully!'); // Debug log
        }

        function openSettings() {
            document.getElementById('settingsPopup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('proficiency').value = currentLevel;
            document.getElementById('appLanguage').value = localStorage.getItem('appLanguage') || 'hindi';
            // Check model status when settings open
            checkAIModelStatus();
        }

        function closeSettings() {
            document.getElementById('settingsPopup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function saveSettings() {
            const selectedLevel = document.getElementById('proficiency').value;
            const selectedLanguage = document.getElementById('appLanguage').value;
            currentLevel = selectedLevel;
            localStorage.setItem('proficiencyLevel', selectedLevel);
            localStorage.setItem('appLanguage', selectedLanguage);
            renderComics();
            closeSettings();
        }

        function deleteAllData() {
            if (confirm('Are you sure you want to delete all data? This will clear your word vault, quiz progress, flashlight data, and all settings. This cannot be undone.')) {
                localStorage.clear();
                sessionStorage.clear();
                closeSettings();
                location.reload();
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing...'); // Debug log
            renderComics();
            
            // Set the dropdown to the current level
            document.getElementById('proficiency').value = currentLevel;
        });

        // Also try to render immediately in case DOM is already loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                renderComics();
            });
        } else {
            // DOM is already loaded
            renderComics();
        }

        // Handle escape key to close settings
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeSettings();
            }
        });

        // Gemma 2B AI Model functions
        async function checkAIModelStatus() {
            const statusDot = document.getElementById('aiModelStatusDot');
            const statusText = document.getElementById('aiModelStatusText');
            const downloadBtn = document.getElementById('downloadAIModelBtn');

            try {
                const status = await TauriAPI.checkModelStatus();
                if (status.installed) {
                    statusDot.className = 'translator-status-dot ready';
                    statusText.textContent = `Ready (${status.size_mb || '~1500'}MB)`;
                    downloadBtn.textContent = 'AI Model Downloaded';
                    downloadBtn.disabled = true;
                } else {
                    statusDot.className = 'translator-status-dot not-ready';
                    statusText.textContent = 'Not downloaded';
                    downloadBtn.textContent = 'Download AI Model';
                    downloadBtn.disabled = false;
                }
            } catch (e) {
                statusDot.className = 'translator-status-dot not-ready';
                statusText.textContent = 'Not available';
            }
        }

        async function downloadAIModel() {
            const btn = document.getElementById('downloadAIModelBtn');
            const progress = document.getElementById('aiModelProgress');
            const progressFill = document.getElementById('aiModelProgressFill');
            const statusText = document.getElementById('aiModelStatusText');

            btn.disabled = true;
            btn.textContent = 'Downloading...';
            progress.style.display = 'block';
            progressFill.style.width = '0%';

            try {
                await TauriAPI.downloadModel((progressData) => {
                    if (progressData.progress !== undefined) {
                        const percent = Math.round(progressData.progress);
                        progressFill.style.width = percent + '%';
                        statusText.textContent = `Downloading... ${percent}%`;
                    }
                });

                document.getElementById('aiModelStatusDot').className = 'translator-status-dot ready';
                statusText.textContent = 'Ready';
                btn.textContent = 'AI Model Downloaded';
                progress.style.display = 'none';

            } catch (e) {
                console.error('Failed to download AI model:', e);
                statusText.textContent = 'Download failed';
                btn.disabled = false;
                btn.textContent = 'Retry Download';
                progress.style.display = 'none';
            }
        }

    </script>
    <script src="onboarding-interactive.js"></script>
</body>
</html>
